name: Build Windows & Mac

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행 가능

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Windows 빌드
        run: |
          pyinstaller --name "BibleVideoMaker" --windowed --onedir --noconfirm --clean --add-data "presets;presets" --add-data "samples;samples" --add-data "qt_bootstrap.py;." --add-data "resource_path.py;." --hidden-import "PyQt6.QtCore" --hidden-import "PyQt6.QtGui" --hidden-import "PyQt6.QtWidgets" --collect-all "PyQt6" app.py

      - name: Windows 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BibleVideoMaker-Windows
          path: dist/BibleVideoMaker/
          compression-level: 9

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Mac 빌드
        run: |
          pyinstaller --name "BibleVideoMaker" --windowed --onedir --noconfirm --clean --add-data "presets:presets" --add-data "samples:samples" --add-data "qt_bootstrap.py:." --add-data "resource_path.py:." --hidden-import "PyQt6.QtCore" --hidden-import "PyQt6.QtGui" --hidden-import "PyQt6.QtWidgets" --collect-all "PyQt6" app.py

      - name: Mac 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BibleVideoMaker-Mac
          path: dist/BibleVideoMaker/
          compression-level: 9
