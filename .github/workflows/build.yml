name: Build Windows & Mac (ffmpeg 포함)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ffmpeg 다운로드 (Windows 정적 바이너리)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffDir = Get-ChildItem ffmpeg_tmp -Directory | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)\bin\ffmpeg.exe" -Destination "ffmpeg.exe"
          Copy-Item "$($ffDir.FullName)\bin\ffprobe.exe" -Destination "ffprobe.exe"
          Remove-Item -Recurse -Force ffmpeg_tmp, ffmpeg.zip
          Write-Host "ffmpeg.exe ready: $(Get-Item ffmpeg.exe | Select-Object -ExpandProperty Length) bytes"

      - name: VC++ 런타임 다운로드 (일반 PC용)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          Write-Host "vc_redist.x64.exe ready: $(Get-Item vc_redist.x64.exe | Select-Object -ExpandProperty Length) bytes"
          Copy-Item "C:\Windows\System32\vcruntime140.dll" -Destination "vcruntime140.dll"
          Copy-Item "C:\Windows\System32\vcruntime140_1.dll" -Destination "vcruntime140_1.dll"
          Copy-Item "C:\Windows\System32\msvcp140.dll" -Destination "msvcp140.dll"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Windows 빌드
        run: |
          pyinstaller --name "BibleVideoMaker" --windowed --onedir --noconfirm --clean --manifest "resources/app.manifest" --add-data "presets;presets" --add-data "samples;samples" --add-data "qt_bootstrap.py;." --add-data "resource_path.py;." --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-binary "vc_redist.x64.exe;." --add-binary "vcruntime140.dll;." --add-binary "vcruntime140_1.dll;." --add-binary "msvcp140.dll;." --hidden-import "PyQt6.QtCore" --hidden-import "PyQt6.QtGui" --hidden-import "PyQt6.QtWidgets" --collect-all "PyQt6" app.py

      - name: Windows 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BibleVideoMaker-Windows
          path: dist/BibleVideoMaker/
          compression-level: 9

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ffmpeg 다운로드 (Mac 정적 바이너리)
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          unzip ffmpeg.zip
          chmod +x ffmpeg
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip ffprobe.zip
          chmod +x ffprobe
          echo "ffmpeg ready: $(ls -la ffmpeg)"
          rm -f ffmpeg.zip ffprobe.zip

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Mac 빌드
        run: |
          pyinstaller --name "BibleVideoMaker" --windowed --onedir --noconfirm --clean --add-data "presets:presets" --add-data "samples:samples" --add-data "qt_bootstrap.py:." --add-data "resource_path.py:." --add-binary "ffmpeg:." --add-binary "ffprobe:." --hidden-import "PyQt6.QtCore" --hidden-import "PyQt6.QtGui" --hidden-import "PyQt6.QtWidgets" --collect-all "PyQt6" app.py

      - name: Mac 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BibleVideoMaker-Mac
          path: dist/BibleVideoMaker/
          compression-level: 9
